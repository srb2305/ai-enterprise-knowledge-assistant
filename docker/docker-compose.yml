version: "3.9"

services:
  app:
    image: python:3.11-slim
    container_name: graphrag-api
    working_dir: /workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt ; uvicorn api.app:app --host 0.0.0.0 --port 8000"
    volumes:
      - ..:/workspace
    environment:
      PGVECTOR_URL: postgresql://postgres:postgres@postgres:5432/pgvector
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - neo4j
      - mlflow

  ui:
    image: python:3.11-slim
    container_name: graphrag-ui
    working_dir: /workspace
    command: sh -c "pip install --no-cache-dir -r requirements.txt ; streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501"
    volumes:
      - ..:/workspace
    environment:
      API_URL: http://app:8000
    ports:
      - "8501:8501"
    depends_on:
      - app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pgvector
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: neo4j
    environment:
      NEO4J_AUTH: neo4j/test
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  mlflow:
    image: python:3.11-slim
    container_name: mlflow
    working_dir: /mlflow
    command: sh -c "pip install --no-cache-dir mlflow ; mlflow server --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  neo4jdata:
  grafana_data:
